image: node:20-alpine

stages:
  - test
  - build

run_tests:
  stage: test
  script:
    - npm ci
    - npm test -- --coverage --ci --forceExit
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      junit: test-results.xml
    paths:
      - coverage/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build_image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker info
    - echo "Construindo imagem para teste local"
  script:
    - |
      docker build \
        --build-arg APP_VERSION=$IMAGE_TAG \
        -t meu-app:$IMAGE_TAG \
        -t meu-app:latest \
        .
    - docker save meu-app:$IMAGE_TAG | gzip > image.tar.gz
    - echo "✅ Imagem construída com sucesso!"
    - echo "📦 Arquivo image.tar.gz gerado (disponível como artefato)"
  artifacts:
    paths:
      - image.tar.gz
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
