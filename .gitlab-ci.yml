image: node:20-alpine

stages:
  - test
  - build

run_tests:
  stage: test
  script:
    - npm ci
    - npm test -- --coverage --ci --forceExit
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      junit: test-results.xml
    paths:
      - coverage/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build_image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    IMAGE_TAG: $CI_COMMIT_SHORT_SHA
    LOCAL_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA  
  before_script:
    - docker info
    - echo "🔑 Fazendo login no registry do GitLab..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker build \
        --build-arg APP_VERSION=$IMAGE_TAG \
        -t $LOCAL_IMAGE \
        -t $CI_REGISTRY_IMAGE:latest \
        .
    - docker push $LOCAL_IMAGE
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker save $LOCAL_IMAGE | gzip > image.tar.gz
    - echo "✅ Imagem publicada no registry do GitLab!"
  artifacts:
    paths:
      - image.tar.gz
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
