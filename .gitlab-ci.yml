image: node:20-alpine

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  REGISTRY_URL: $CI_REGISTRY_IMAGE

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

stages:
  - test
  - build
  - push

run_tests:
  stage: test
  script:
    - npm ci
    - npm test -- --coverage --ci --forceExit
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      junit: test-results.xml
    paths:
      - coverage/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build_image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker info
    - echo "🔑 Fazendo login no registry do GitLab..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker build \
        --build-arg APP_VERSION=$IMAGE_TAG \
        -t $REGISTRY_URL:$IMAGE_TAG \
        -t $REGISTRY_URL:latest \
        .
    - docker save $REGISTRY_URL:$IMAGE_TAG $REGISTRY_URL:latest | gzip > image.tar.gz
    - echo "✅ Imagem publicada no registry do GitLab!"
  artifacts:
    paths:
      - image.tar.gz
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

push_to_registry:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker info
    - docker load < image.tar.gz
    - echo "🔑 Fazendo login no registry do GitLab..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker push $REGISTRY_URL:$IMAGE_TAG
    - docker push $REGISTRY_URL:latest
    - echo "$REGISTRY_URL:$IMAGE_TAG" > image_url.txt
    - echo "✅ Imagem publicada no registry do GitLab!" $REGISTRY_URL:$IMAGE_TAG
  artifacts:
    paths:
      - image_url.txt
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test_dockerfile:
  stage: test
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t test-image:$IMAGE_TAG .
    - docker run -d -p 3000:3000 --name test-container test-image:$IMAGE_TAG
    - sleep 5
    - docker logs test-container
    - docker stop test-container
    - docker rm test-container
    - echo "✅ Dockerfile testado com sucesso!"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true
